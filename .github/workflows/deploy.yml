name: Deploy to Sakura VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ~/restaurant_dashboard

            # 最新コードを取得
            git pull origin main

            # セキュリティ環境変数を .env に書き出し
            printf 'CREDENTIAL_ENCRYPTION_KEY=%s\nBACKEND_API_KEY=%s\n' \
              '${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}' \
              '${{ secrets.BACKEND_API_KEY }}' > .env
            chmod 600 .env

            # Docker Compose でビルド＆再起動
            docker compose down
            docker compose up -d --build

            # 不要なイメージを削除
            docker image prune -f
